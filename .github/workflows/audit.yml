name: Audit (cargo-audit)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: Monday 06:00 UTC. Offsets the scorecard schedule.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust (stable)
        run: rustup default stable

      - name: Cache cargo registry & target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.0.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-audit-

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit --version ^0.21

      - name: Run cargo audit
        run: cargo audit --deny warnings
