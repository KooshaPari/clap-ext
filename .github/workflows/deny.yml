name: Deny (cargo-deny)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: Wednesday 06:00 UTC. Offsets audit/scorecard schedules.
    - cron: '0 6 * * 3'
  workflow_dispatch:

concurrency:
  group: deny-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust (stable)
        run: rustup default stable

      - name: Cache cargo registry & target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.0.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-deny-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-deny-

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny --version ^0.16

      - name: Run cargo deny
        run: cargo deny check
