name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish, just plan)'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: cargo publish (crates.io)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.85.0
        with:
          toolchain: stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # 2.7.7
        with:
          workspaces: |
            . -> target

      - name: Verify tag matches workspace version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            ver="${tag#v}"
            ws_ver="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
            if [[ "${ver}" != "${ws_ver}" ]]; then
              echo "::error::Tag ${tag} (${ver}) does not match workspace version ${ws_ver}"
              exit 1
            fi
          fi

      - name: Build release artifacts
        run: cargo build --release --locked --workspace --all-targets

      - name: Run tests (release mode)
        run: cargo test --release --locked --workspace

      - name: Dry run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: cargo publish --dry-run --locked --workspace --all-features

      - name: Publish to crates.io
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Publish each workspace crate in dependency order.
          cargo publish --locked -p clap-ext-macros
          sleep 30  # let crates.io index the macros crate
          cargo publish --locked -p clap-ext

      - name: Summary
        if: always()
        run: |
          echo "### Release summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: ${{ github.ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- sha: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
